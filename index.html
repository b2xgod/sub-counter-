<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subscriber Counter</title>
<style>
html,body{
margin:0;
padding:0;
background:transparent;
overflow:hidden;
font-family:Arial,sans-serif;
}
#count{
color:white;
font-size:80px;
font-weight:bold;
text-shadow:2px 2px 8px black;
text-align:center;
margin-top:20px;
}
</style>
</head>
<body>
<div id="count">Loading...</div>

<script>
const API_KEY=const API_KEY="AIzaSyAg1qOsIYnyAciv2oG_88eubeVL-pl_qZY";
const CHANNEL_ID="UC01GtO0RvL1OrRAzV7SgLRg";

async function update(){
try{
const res=await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`);
const data=await res.json();
document.getElementById("count").innerText=data.items[0].statistics.subscriberCount;
}catch(e){
document.getElementById("count").innerText="Error";
}
}
update();
setInterval(update,10000);
</script>
</body>
</html>
